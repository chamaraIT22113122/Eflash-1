[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# nft bundler handles mongodb reliably
[functions]
  node_bundler = "nft"

# ── API Proxy ─────────────────────────────────────────────────────────────────
# Proxy /api/* → /.netlify/functions/* so CORS headers can be applied.
# Netlify restricts headers/redirects on /.netlify paths, but /api/* is free.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# SPA catch-all (must come AFTER /api/*)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── CORS headers ──────────────────────────────────────────────────────────────
# Apply at Netlify's CDN edge for ALL responses (including platform-level 500s)
# so CORS headers are present even if the Lambda function crashes.
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Max-Age = "86400"

# Also apply on the underlying function path (covers direct invocations)
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Max-Age = "86400"

[dev]
  command = "npm run dev"
  port = 5173
  autoLaunch = false